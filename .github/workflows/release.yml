name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'push' || !github.event.head_commit || !contains(github.event.head_commit.message, '[skip ci]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify build and tests
        run: |
          pnpm run lint
          pnpm run test:run
          pnpm run build

      - name: Configure git for release push
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # @semantic-release/git uses explicit URL (not origin), so configure credential store
          # so git push https://github.com/... uses RELEASE_TOKEN instead of GITHUB_TOKEN
          git config --global credential.helper store
          echo "https://x-access-token:${RELEASE_TOKEN}@github.com" > "$HOME/.git-credentials"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: pnpm exec semantic-release
