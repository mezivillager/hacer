name: PR Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v5

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Add GitHub Pages files
        run: |
          touch dist/.nojekyll
          cp dist/index.html dist/404.html

      - name: Deploy preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '## 🚀 Deploy Preview'

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 🚀 Deploy Preview

            | Name | Link |
            |------|------|
            | Preview URL | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/ |
            | Commit | ${{ github.event.pull_request.head.sha }} |

            _Updated: ${{ github.event.pull_request.updated_at }}_

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        id: checkout-gh-pages
        continue-on-error: true
        with:
          ref: gh-pages

      - name: Skip cleanup (no gh-pages branch)
        if: steps.checkout-gh-pages.outcome != 'success'
        run: echo "gh-pages branch does not exist yet, skipping cleanup."

      - name: Remove preview directory
        if: steps.checkout-gh-pages.outcome == 'success'
        run: |
          if [ -d "pr-preview/pr-${{ github.event.pull_request.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "pr-preview/pr-${{ github.event.pull_request.number }}"
            git commit -m "chore: remove PR #${{ github.event.pull_request.number }} deploy preview"
            git push
          else
            echo "Preview directory does not exist, nothing to clean up."
          fi

      - name: Find existing comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '## 🚀 Deploy Preview'

      - name: Update comment on cleanup
        if: steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## 🚀 Deploy Preview

            🧹 Preview has been removed (PR closed).
