name: Mutation Testing

on:
  pull_request:
    paths: ['src/**']

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v5

      - run: pnpm install --frozen-lockfile

      - name: Run Stryker (changed files only, max 3)
        run: bash scripts/stryker-changed.sh ${{ github.event.pull_request.base.sha }}
        env:
          STRYKER_CHANGED_MAX_FILES: 3

      - name: Upload mutation report
        if: always() && hashFiles('reports/mutation/mutation.html') != ''
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
